<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy: 多層防御の最終ライン。
      - default-src 'self' のみで、任意の外部リソース読み込みを禁止
      - connect-src は loopback の Ollama / MCP HTTP のみ許可（ws:// はストリーム用）
      - style-src 'unsafe-inline' は React の inline-style を許容するため必要（最小化検討中）
      - img-src 'self' data: は base64 アイコン用
      - object-src/frame-src 'none' で iframe・object 注入を完全遮断
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'none';" />
    <title>Melunai</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        background: #FAF6F1;
        color: #5A4E48;
      }

      /* Scrollbar styling — warm neutral matching Melunai palette */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(100, 90, 82, 0.18);
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(100, 90, 82, 0.32);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Entry point bundled by Vite -->
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
